_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: Issue Planner
  description: Trigger GitHub and Jira issue plans from Slack.
  background_color: "#1F2937"

features:
  bot_user:
    display_name: Issue Planner
    always_online: false
  slash_commands:
    - command: /plan
      url: https://YOUR_PUBLIC_DOMAIN/webhooks/slack
      description: Create a plan for a GitHub issue or Jira ticket
      usage_hint: "<target> [--quick|--full] [repo=owner/repo]"
      should_escape: true
    - command: /replan
      url: https://YOUR_PUBLIC_DOMAIN/webhooks/slack
      description: Replan an existing GitHub issue or Jira ticket
      usage_hint: "<target> [repo=owner/repo]"
      should_escape: true

oauth_config:
  scopes:
    bot:
      - commands

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
