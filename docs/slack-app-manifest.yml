display_information:
  name: Issue Planner
  description: Plan GitHub and Jira work items from Slack
  background_color: "#1F2937"

features:
  bot_user:
    display_name: Issue Planner
    always_online: false
  slash_commands:
    - command: /plan
      url: https://ai-workflow.toolchad.net/webhooks/slack
      description: Create an issue plan
      usage_hint: "<target> [--quick|--full] [repo=owner/repo]"
      should_escape: false
    - command: /replan
      url: https://ai-workflow.toolchad.net/webhooks/slack
      description: Replan an issue
      usage_hint: "<target> [repo=owner/repo]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
